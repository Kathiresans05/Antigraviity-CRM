<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Clearing Cache...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8fafc; flex-direction: column; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #1F6F8B; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #64748b; font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p id="msg">Clearing old cache and service workers...</p>
  <script>
    async function clearAndRedirect() {
      try {
        // Unregister all service workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(r => r.unregister()));
        }
        // Clear all caches
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
        
        document.getElementById('msg').textContent = 'Done! Redirecting...';
        setTimeout(() => { window.location.href = '/'; }, 800);
      } catch (e) {
        document.getElementById('msg').textContent = 'Redirecting...';
        setTimeout(() => { window.location.href = '/'; }, 800);
      }
    }
    clearAndRedirect();
  </script>
</body>
</html>
